<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="TaskFlow.css">
    <link rel="shortcut icon" href="Assets/favicon.ico" type="image/x-icon">
</head>
<body>
<!--Górny pasek z narzędziami-->
    <nav>
        <button id="listWrap" class="nav-btns">Lista</button>
        <div id="rBtns">
            <button id="dlMode" class="nav-btns">DL</button>
            <button id="settings" class="nav-btns">Ustawienia</button>
        </div>
    </nav>
<!--Część dla uzytkownika i kategorii tasków-->
    <main>
        <aside>
            <section id="user">
                <div id="userPhoto">
                    <img id="usPhoto" src="Assets/profile.png" alt="userPhoto">
                </div>
                <div id="userInfo">
                    <h3 id="userName">User Name</h3>
                    <hr>
                    <p id="userMail">ExamplerUserMail@gmail.com</p>
                </div>
            </section>
            <section id="categoties">
                <!--In progress...-->
            </section>
        </aside>
    <!--Główny element z taskami-->
        <section id="taskSection">
            <div id="createTask">
                <input type="text" name="taskTitle" id="taskTitle" required placeholder="Tytuł">
                <!--suppress HtmlUnknownAttribute -->
                <textarea type="text" name="taskDesc" id="taskDesc" placeholder="Opis"
                cols="20" rows="20" ></textarea>
                <button id="addTask">Dodaj</button>
            </div>
            <div id="pending" class="taskLists">
                <h3 style="padding-top: 5px">Oczekujące</h3>
                <hr>
                <div class="taskUlList">
                    <ul id="pendingList" style="list-style: none;">
                        <li>Example 1</li>
                        <li>Example 2</li>
                        <li>Example 3</li>
                        <li>Example 4</li>
                        <li>Example 1</li>
                    </ul>
                </div>
            </div>
            <div id="inProgress" class="taskLists">
                <h3 style="padding-top: 5px">W trakcie</h3>
                <hr>
                <div class="taskUlList">
                    <ul id="inProgressList" style="list-style: none;">
                        <li>Example 1</li>
                        <li>Example 2</li>
                        <li>Example 3</li>
                        <li>Example 4</li>
                    </ul>
                </div>
            </div>
            <div id="completed" class="taskLists">
                <h3 style="padding-top: 5px">Skończone</h3>
                <hr>
                <div class="taskUlList">
                    <ul id="completedList" style="list-style: none;">
                        <li>Example 1</li>
                        <li>Example 2</li>
                        <li>Example 3</li>
                        <li>Example 4</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>
<script src="TaskFlow.js"></script>
</body>
</html>
